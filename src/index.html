<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LokalAgent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--border:#2e2e2e;
  --text:#e8e6e0;--muted:#666360;--accent:#c9a96e;--accent2:#e2c99a;
  --user-bg:#1f1e1b;--agent-bg:#161614;
  --think-bg:#1a1520;--think-border:#3a2d50;--think-text:#9d8fc0;
  --radius:16px;
  --font-body:'DM Sans',sans-serif;--font-head:'Instrument Serif',serif;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:30px;height:30px;background:linear-gradient(135deg,#c9a96e,#8b6f3e);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.logo-text{font-family:var(--font-head);font-size:20px;letter-spacing:-0.3px}
.logo-text span{color:var(--accent);font-style:italic}
.header-right{display:flex;align-items:center;gap:10px}
.lang-select-wrap{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--muted)}
.lang-select-wrap select{background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font-body);font-size:12px;cursor:pointer}
.clear-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--muted);cursor:pointer;font-family:var(--font-body);transition:all 0.15s}
.clear-btn:hover{border-color:#c0392b44;color:#e57373}

/* Chat */
#chat{flex:1;overflow-y:auto;padding:24px 0;scroll-behavior:smooth}
#chat::-webkit-scrollbar{width:4px}
#chat::-webkit-scrollbar-thumb{background:#222;border-radius:4px}

.message-row{display:flex;padding:4px 24px;gap:12px;animation:fadeUp 0.2s ease forwards;opacity:0;transform:translateY(4px)}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.message-row.user{flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:2px}
.avatar.user-av{background:#2a2520;color:var(--accent);border:1px solid #3a3020;font-weight:500}
.avatar.agent-av{background:linear-gradient(135deg,#c9a96e22,#8b6f3e22);border:1px solid #c9a96e33;color:var(--accent);font-size:15px}
.bubble-wrap{display:flex;flex-direction:column;gap:6px;max-width:75%}
.message-row.user .bubble-wrap{align-items:flex-end}
.bubble{padding:12px 16px;border-radius:var(--radius);font-size:15px;line-height:1.7;word-break:break-word}
.bubble.user{background:var(--user-bg);border:1px solid #2a2820;border-bottom-right-radius:4px}
.bubble.agent{background:var(--agent-bg);border:1px solid var(--border);border-bottom-left-radius:4px}

/* Thinking block */
.think-block{background:var(--think-bg);border:1px solid var(--think-border);border-radius:10px;padding:10px 14px;margin-bottom:6px;font-size:13px;color:var(--think-text);line-height:1.6}
.think-header{display:flex;align-items:center;gap:6px;font-size:11px;color:#7a6d9a;margin-bottom:6px;cursor:pointer;user-select:none}
.think-header::before{content:'▸';transition:transform 0.2s}
.think-header.open::before{transform:rotate(90deg)}
.think-content{display:none}
.think-content.show{display:block}

/* Code blocks */
.code-block{background:#0d0d0d;border:1px solid #222;border-radius:10px;margin:10px 0;overflow:hidden}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#141414;border-bottom:1px solid #222}
.code-lang{font-size:11px;color:var(--muted);font-family:monospace;text-transform:lowercase}
.copy-btn{background:transparent;border:1px solid #333;border-radius:5px;padding:2px 8px;font-size:11px;color:var(--muted);cursor:pointer;font-family:var(--font-body);transition:all 0.15s}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.copy-btn.copied{border-color:#4caf7d;color:#4caf7d}
.code-block pre{margin:0;padding:14px;overflow-x:auto;font-size:13px;line-height:1.55}
.code-block code{font-family:'Courier New',monospace;color:#c9b99a}

/* Tool pills */
.tools-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.tool-pill{background:#1e1c17;border:1px solid #3a3520;border-radius:20px;padding:2px 10px;font-size:11px;color:var(--accent);animation:popIn 0.2s ease}
@keyframes popIn{from{transform:scale(0.85);opacity:0}to{transform:scale(1);opacity:1}}

/* MoE progress */
.progress-panel{background:var(--agent-bg);border:1px solid var(--border);border-radius:var(--radius);border-bottom-left-radius:4px;padding:14px 16px;display:flex;flex-direction:column;gap:8px;min-width:280px}
.progress-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);transition:color 0.2s}
.progress-row.running{color:var(--accent2)}
.progress-row.done{color:#4caf7d}
.progress-row.error{color:#e57373}
.step-dot{width:18px;height:18px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.step-dot.running{border-color:var(--accent);animation:pulse 1s infinite}
.step-dot.done{background:#4caf7d22;border-color:#4caf7d;color:#4caf7d}
.step-dot.error{background:#e5737322;border-color:#e57373}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Typing */
.typing-bubble{background:var(--agent-bg);border:1px solid var(--border);border-radius:var(--radius);border-bottom-left-radius:4px;padding:14px 18px;display:flex;gap:5px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:bounce 1.1s infinite}
.dot:nth-child(2){animation-delay:0.18s}.dot:nth-child(3){animation-delay:0.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.35}40%{transform:translateY(-4px);opacity:1}}

/* Empty state */
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--muted);text-align:center;padding:40px}
.empty-icon{font-size:32px;opacity:0.4}
.empty-title{font-family:var(--font-head);font-size:26px;color:var(--text);font-style:italic;opacity:0.9}
.empty-sub{font-size:13px;max-width:380px;line-height:1.7;opacity:0.6}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:6px}
.chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--muted);cursor:pointer;transition:all 0.15s}
.chip:hover{border-color:var(--accent);color:var(--accent2);background:#1a1813}

/* Input area */
#input-area{padding:10px 20px 18px;flex-shrink:0}
#file-pill{display:none;align-items:center;gap:8px;background:#1a1813;border:1px solid #3a3520;border-radius:8px;padding:5px 12px;margin-bottom:8px;font-size:12px;color:var(--accent2);width:fit-content}
#file-pill.show{display:flex}
.file-badge{font-size:10px;color:var(--muted);background:#252420;border-radius:8px;padding:1px 7px}
.file-badge.ready{color:#4caf7d}

.input-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:8px 8px 8px 16px;transition:border-color 0.15s;display:flex;flex-direction:column;gap:6px}
.input-box:focus-within{border-color:#c9a96e44}
textarea{width:100%;background:transparent;border:none;outline:none;font-family:var(--font-body);font-size:15px;color:var(--text);resize:none;max-height:160px;line-height:1.55;padding:4px 0;min-height:24px}
textarea::placeholder{color:var(--muted)}

.input-actions{display:flex;align-items:center;justify-content:space-between;padding:0 2px}
.input-left{display:flex;align-items:center;gap:6px}

/* Attach button */
.attach-btn{width:30px;height:30px;border-radius:8px;background:transparent;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all 0.15s}
.attach-btn:hover{border-color:var(--accent);color:var(--accent)}
.attach-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Think button — key feature */
.think-btn{display:flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--muted);cursor:pointer;font-family:var(--font-body);transition:all 0.2s}
.think-btn:hover{border-color:#7a6d9a;color:#9d8fc0;background:#1a1520}
.think-btn.active{background:#1a1520;border-color:#7a6d9a;color:#b8a8d8}
.think-btn .think-icon{font-size:13px;transition:transform 0.3s}
.think-btn.active .think-icon{animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.think-label{font-size:12px}

.input-right{display:flex;align-items:center;gap:6px}
/* Send button */
#send-btn{width:34px;height:34px;border-radius:10px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s,transform 0.1s;flex-shrink:0}
#send-btn:hover{background:var(--accent2)}
#send-btn:active{transform:scale(0.92)}
#send-btn:disabled{background:#2a2820;cursor:not-allowed}
#send-btn svg{fill:#0f0f0f;width:14px;height:14px}
.hint{text-align:center;font-size:11px;color:#3a3835;margin-top:8px}
#file-input{display:none}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-mark">&#x2736;</div>
    <div class="logo-text">Lokal<span>Agent</span></div>
  </div>
  <div class="header-right">
    <div class="lang-select-wrap">
      <span>Lang:</span>
      <select id="lang-select" onchange="setLanguage(this.value)">
        <option value="python">Python</option>
        <option value="javascript">JavaScript</option>
        <option value="typescript">TypeScript</option>
        <option value="bash">Bash</option>
        <option value="java">Java</option>
        <option value="go">Go</option>
        <option value="rust">Rust</option>
      </select>
    </div>
    <button class="clear-btn" onclick="clearChat()">Clear</button>
  </div>
</header>

<div id="chat">
  <div id="empty-state">
    <div class="empty-icon">&#x2736;</div>
    <div class="empty-title">How can I help?</div>
    <div class="empty-sub">Powered by deepseek-r1 locally. Hit <strong>Think</strong> for complex multi-step tasks.</div>
    <div class="chips">
      <div class="chip" onclick="go(this)">What is today's date?</div>
      <div class="chip" onclick="go(this)">Explain quantum entanglement</div>
      <div class="chip" onclick="go(this)">Search gold price, calculate 10%, save to gold.txt</div>
      <div class="chip" onclick="go(this)">Summarise the uploaded document</div>
    </div>
  </div>
</div>

<div id="input-area">
  <div id="file-pill">
    <span>&#x1F4C4;</span>
    <span id="pill-name" style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    <span class="file-badge" id="pill-badge">Indexing...</span>
    <span style="cursor:pointer;color:var(--muted);margin-left:2px;font-size:15px" onclick="removeFile()">&#x00D7;</span>
  </div>

  <div class="input-box" id="input-box">
    <textarea id="user-input" rows="1" placeholder="Message LokalAgent..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <div class="input-actions">
      <div class="input-left">
        <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="Upload PDF">
          <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input type="file" id="file-input" accept=".pdf" onchange="handleFileUpload(this)">
        <button class="think-btn" id="think-btn" onclick="toggleThink()" title="Activate MoE for complex tasks">
          <span class="think-icon">&#x2728;</span>
          <span class="think-label">Think</span>
        </button>
      </div>
      <div class="input-right">
        <button id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 16 16"><path d="M1 8L15 1L8 15L6.5 9.5L1 8Z"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="hint">deepseek-r1 &middot; fully local &middot; LokalAgent</div>
</div>

<script>
const chatEl   = document.getElementById('chat');
const input    = document.getElementById('user-input');
const sendBtn  = document.getElementById('send-btn');
const thinkBtn = document.getElementById('think-btn');
const empty    = document.getElementById('empty-state');
const filePill = document.getElementById('file-pill');
const sessionId = 'sess_' + Math.random().toString(36).slice(2);

let busy      = false;
let thinkMode = false;

function toggleThink() {
  thinkMode = !thinkMode;
  thinkBtn.classList.toggle('active', thinkMode);
  input.placeholder = thinkMode
    ? 'Describe a complex task for the MoE pipeline...'
    : 'Message LokalAgent...';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function go(el) { input.value = el.textContent; sendMessage(); }
function hideEmpty() { if (empty) empty.style.display = 'none'; }

async function setLanguage(lang) {
  await fetch('/set-language', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({language: lang})
  });
}

// ── File upload ────────────────────────────────────────────────────────────
async function handleFileUpload(el) {
  const file = el.files[0]; if (!file) return;
  filePill.classList.add('show');
  document.getElementById('pill-name').textContent = file.name;
  const badge = document.getElementById('pill-badge');
  badge.textContent = 'Indexing...'; badge.className = 'file-badge';
  const fd = new FormData(); fd.append('file', file);
  try {
    const res  = await fetch('/upload', {method:'POST', body:fd});
    const data = await res.json();
    if (data.error) { badge.textContent = 'Error'; return; }
    badge.textContent = `Ready · ${data.pages}p`; badge.className = 'file-badge ready';
    addMessage('agent', `**${data.filename}** indexed — ${data.pages} pages, ${data.nodes} sections. Ask me anything about it.`);
  } catch(e) { badge.textContent = 'Error'; }
  el.value = '';
}
function removeFile() {
  filePill.classList.remove('show');
  fetch('/clear', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({session_id:sessionId})});
}

// ── Message helpers ────────────────────────────────────────────────────────
function addMessage(role, text, toolsUsed) {
  hideEmpty();
  const row  = document.createElement('div'); row.className = 'message-row ' + role;
  const av   = document.createElement('div'); av.className  = 'avatar ' + (role==='user' ? 'user-av' : 'agent-av');
  av.textContent = role === 'user' ? 'H' : '\u2736';
  const wrap = document.createElement('div'); wrap.className = 'bubble-wrap';
  if (toolsUsed && toolsUsed.length) {
    const tr = document.createElement('div'); tr.className = 'tools-row';
    toolsUsed.forEach(t => { const p = document.createElement('div'); p.className='tool-pill'; p.textContent=t.replace(/_/g,' '); tr.appendChild(p); });
    wrap.appendChild(tr);
  }
  const bubble = document.createElement('div'); bubble.className = 'bubble ' + role;
  bubble.innerHTML = fmt(text);
  wrap.appendChild(bubble); row.appendChild(av); row.appendChild(wrap);
  chatEl.appendChild(row); chatEl.scrollTop = chatEl.scrollHeight;
  return bubble;
}

function addStreamingMessage() {
  hideEmpty();
  const row  = document.createElement('div'); row.className = 'message-row agent';
  const av   = document.createElement('div'); av.className  = 'avatar agent-av'; av.textContent = '\u2736';
  const wrap = document.createElement('div'); wrap.className = 'bubble-wrap';

  // Think block (hidden by default, shown when thinking tokens arrive)
  const thinkBlock = document.createElement('div'); thinkBlock.className = 'think-block'; thinkBlock.style.display = 'none';
  const thinkHeader = document.createElement('div'); thinkHeader.className = 'think-header'; thinkHeader.textContent = 'Thinking...';
  const thinkContent = document.createElement('div'); thinkContent.className = 'think-content';
  thinkHeader.onclick = () => { thinkContent.classList.toggle('show'); thinkHeader.classList.toggle('open'); };
  thinkBlock.appendChild(thinkHeader); thinkBlock.appendChild(thinkContent);

  const bubble = document.createElement('div'); bubble.className = 'bubble agent';
  wrap.appendChild(thinkBlock); wrap.appendChild(bubble);
  row.appendChild(av); row.appendChild(wrap);
  chatEl.appendChild(row);
  return { bubble, thinkBlock, thinkContent, thinkHeader };
}

function createProgressPanel() {
  hideEmpty();
  const row  = document.createElement('div'); row.className = 'message-row agent'; row.id = 'moe-row';
  const av   = document.createElement('div'); av.className  = 'avatar agent-av'; av.textContent = '\u2736';
  const wrap = document.createElement('div'); wrap.className = 'bubble-wrap';
  const panel = document.createElement('div'); panel.className = 'progress-panel'; panel.id = 'moe-panel';
  wrap.appendChild(panel); row.appendChild(av); row.appendChild(wrap);
  chatEl.appendChild(row); chatEl.scrollTop = chatEl.scrollHeight;
  return panel;
}

function updateProgress(panel, event) {
  if (!panel) return;
  if (event.type === 'progress') {
    const id = 'prog-' + event.label.replace(/\s/g,'-');
    if (!panel.querySelector('#'+id)) {
      const row = document.createElement('div'); row.className = 'progress-row running'; row.id = id;
      row.innerHTML = `<div class="step-dot running">&#x25BA;</div><span>${event.label}</span>`;
      panel.appendChild(row);
    }
  } else if (event.type === 'step') {
    const id = `step-${event.step}-${event.expert}`;
    let row = panel.querySelector('#'+id);
    if (!row) { row = document.createElement('div'); row.id = id; panel.appendChild(row); }
    const cls  = event.status==='running'?'running':event.status==='done'?'done':'error';
    const icon = event.status==='running'?'&#x25BA;':event.status==='done'?'&#x2714;':'&#x2716;';
    row.className = `progress-row ${cls}`;
    row.innerHTML = `<div class="step-dot ${cls}">${icon}</div><span>Step ${event.step}: ${event.label||event.expert}</span>`;
  }
  chatEl.scrollTop = chatEl.scrollHeight;
}

// ── Format helpers ─────────────────────────────────────────────────────────
function fmt(t) {
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, c) => {
    const code = esc(c.trim()); const label = lang || 'code';
    return `<div class="code-block"><div class="code-header"><span class="code-lang">${label}</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>${code}</code></pre></div>`;
  });
  t = t.replace(/`([^`]+)`/g, '<code style="background:#1c1c1c;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:13px;color:#c9b99a">$1</code>');
  t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\n/g, '<br>');
  return t;
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function copyCode(btn) {
  navigator.clipboard.writeText(btn.closest('.code-block').querySelector('code').innerText).then(() => {
    btn.textContent='Copied!'; btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');}, 2000);
  });
}

// ── Send ───────────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = input.value.trim();
  if (!text || busy) return;
  busy = true; sendBtn.disabled = true;
  input.value = ''; input.style.height = 'auto';
  addMessage('user', text);

  if (thinkMode) {
    await sendThink(text);
  } else {
    await sendDirect(text);
  }

  busy = false; sendBtn.disabled = false; input.focus();
}

async function sendDirect(text) {
  // Step 1: show typing dots — ONE row only
  hideEmpty();
  const typingRow = document.createElement('div');
  typingRow.className = 'message-row agent';
  typingRow.id = 'typing-row';
  const typingAv = document.createElement('div');
  typingAv.className = 'avatar agent-av';
  typingAv.textContent = '\u2736';
  const typingWrap = document.createElement('div');
  typingWrap.className = 'bubble-wrap';
  const typingBub = document.createElement('div');
  typingBub.className = 'typing-bubble';
  typingBub.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  typingWrap.appendChild(typingBub);
  typingRow.appendChild(typingAv);
  typingRow.appendChild(typingWrap);
  chatEl.appendChild(typingRow);
  chatEl.scrollTop = chatEl.scrollHeight;

  // Step 2: prepare streaming message row but DO NOT add to DOM yet
  // WHY: addStreamingMessage() appends to DOM immediately.
  // We only want ONE row — the typing row — until content arrives.
  // We create the streaming row lazily on first content event.
  let streamRow    = null;  // the final message row
  let bubble       = null;
  let thinkBlock   = null;
  let thinkContent = null;
  let thinkHeader  = null;

  function ensureRow() {
    // Called on first think or token event
    // Removes typing dots and creates the real message row exactly once
    if (streamRow) return;
    document.getElementById('typing-row')?.remove();
    const m  = addStreamingMessage();
    streamRow    = m.bubble.closest('.message-row');
    bubble       = m.bubble;
    thinkBlock   = m.thinkBlock;
    thinkContent = m.thinkContent;
    thinkHeader  = m.thinkHeader;
    bubble.style.display = 'none'; // hidden until first token
  }

  let fullText  = '';
  let thinkText = '';

  try {
    const controller = new AbortController();
    const timeout    = setTimeout(() => controller.abort(), 3000000);
    const res = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, session_id: sessionId}),
      signal: controller.signal,
    });
    clearTimeout(timeout);

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let   buf     = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        try {
          const ev = JSON.parse(line.slice(5).trim());

          if (ev.type === 'think') {
            // Thinking started — show row but keep bubble hidden (dots still showing)
            ensureRow();
            thinkBlock.style.display = 'block';
            thinkText += ev.token;
            thinkContent.textContent = thinkText;

          } else if (ev.type === 'think_end') {
            if (thinkHeader) thinkHeader.textContent = 'Thought process';

          } else if (ev.type === 'token') {
            // First real token — remove dots, show bubble, start streaming
            ensureRow();
            document.getElementById('typing-row')?.remove();
            bubble.style.display = '';
            fullText += ev.token;
            bubble.innerHTML = fmt(fullText) + '<span style="opacity:0.4">\u25AE</span>';
            chatEl.scrollTop = chatEl.scrollHeight;

          } else if (ev.type === 'done') {
            document.getElementById('typing-row')?.remove();
            if (bubble) {
              bubble.style.display = '';
              bubble.innerHTML = fmt(fullText) || fmt(thinkText) || 'Done.';
            }

          } else if (ev.type === 'error') {
            document.getElementById('typing-row')?.remove();
            ensureRow();
            bubble.style.display = '';
            bubble.innerHTML = 'Error: ' + ev.message;
          }
        } catch(e) {}
      }
    }
  } catch (err) {
    document.getElementById('typing-row')?.remove();
    if (bubble) {
      bubble.style.display = '';
      bubble.innerHTML = err.name === 'AbortError' ? 'Request timed out.' : 'Could not reach server: ' + err.message;
    } else {
      addMessage('agent', err.name === 'AbortError' ? 'Request timed out.' : 'Could not reach server.');
    }
  }
}

async function sendThink(text) {
  const panel = createProgressPanel();
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 300000);
    const res = await fetch('/think', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: text, session_id: sessionId}),
      signal: controller.signal
    });
    clearTimeout(timeout);
    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n'); buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        try {
          const ev = JSON.parse(line.slice(5).trim());
          if (ev.type === 'done') {
            document.getElementById('moe-row')?.remove();
            addMessage('agent', ev.response, ev.tools_used || []);
          } else if (ev.type === 'error') {
            document.getElementById('moe-row')?.remove();
            addMessage('agent', 'Error: ' + ev.message);
          } else {
            updateProgress(panel, ev);
          }
        } catch(e) {}
      }
    }
  } catch (err) {
    document.getElementById('moe-row')?.remove();
    addMessage('agent', err.name==='AbortError' ? 'Request timed out.' : 'Could not reach server: ' + err.message);
  }
}

async function clearChat() {
  await fetch('/clear', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({session_id:sessionId})});
  [...chatEl.querySelectorAll('.message-row')].forEach(r=>r.remove());
  filePill.classList.remove('show');
  empty.style.display = 'flex';
}
